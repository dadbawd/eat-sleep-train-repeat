<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Content-Security-Policy: lock the app to its own assets. No inline scripts,
         no third-party origins. 'unsafe-inline' is allowed for styles only (React
         inline style attributes); connect-src allows https for the AI parsing call
         (same-origin on web, the deployed site origin in the native app). -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https:; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0c0d10" />
    <meta name="description" content="Log food, sleep, and training in seconds. Repeat builds your patterns." />

    <!-- iOS home-screen app behaviour -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EST Repeat" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Eat Sleep Train Repeat</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
